<!doctype html>
<html lang="en-GB" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Horus Heresy — A Reading Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Cinzel:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     PALETTES
       Dark  = Imperium of Man (obsidian, bone, aquila gold, crimson)
       Light = Parchment (aged vellum, iron-gall ink, rubrication red)
     ============================================================ */

  :root[data-theme="dark"] {
    --bg:          #08070a;      /* deep obsidian, faint blue-black */
    --bg-raised:   #12100e;
    --ink:         #efe6cf;      /* warm bone/ivory — ~16:1 on bg */
    --ink-dim:     #c9bda1;      /* aged parchment — ~11:1 */
    --ink-meta:    #9a8e70;      /* faded gilt — ~5.5:1 */
    --ink-faint:   #665c48;
    --rule:        #3a3020;      /* warm bronze rule */
    --rule-soft:   #221c14;
    --accent:      #c9a24a;      /* aquila gold */
    --accent-hi:   #e7c069;      /* burnished gold highlight */
    --accent-soft: #8a6c26;
    --crimson:     #a52a2a;      /* Imperial crimson — must-read / warnings */
    --raven:       #9db2ce;      /* silver-blue for RG mark */
    --read-tint:   #6a6250;
    --check-tick:  #08070a;
    --paper-grain: none;
    --vignette:
      radial-gradient(ellipse 90% 60% at 50% 0%, rgba(201, 162, 74, 0.07), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(165, 42, 42, 0.04), transparent 60%);
  }

  :root[data-theme="light"] {
    --bg:          #ede1c2;      /* aged vellum */
    --bg-raised:   #e3d5b0;
    --ink:         #2a1a0c;      /* iron gall ink — ~14:1 on bg */
    --ink-dim:     #4a3620;      /* faded ink — ~9:1 */
    --ink-meta:    #6b502e;      /* faded gilt — ~5.5:1 */
    --ink-faint:   #907450;
    --rule:        #b8a37a;
    --rule-soft:   #d3c197;
    --accent:      #8a1e14;      /* vermillion — medieval rubrication */
    --accent-hi:   #a52a1a;
    --accent-soft: #6a1810;
    --crimson:     #8a1e14;
    --raven:       #2a3c58;      /* deep manuscript ultramarine */
    --read-tint:   #a08967;
    --check-tick:  #ede1c2;
    /* subtle paper grain — dark warm noise, very low alpha */
    --paper-grain: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.10  0 0 0 0 0.06  0 0 0 0 0.03  0 0 0 0.07 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    --vignette:
      radial-gradient(ellipse 80% 50% at 25% 15%, rgba(120, 70, 30, 0.06), transparent 55%),
      radial-gradient(ellipse 70% 50% at 80% 85%, rgba(120, 70, 30, 0.05), transparent 55%),
      radial-gradient(ellipse 100% 30% at 50% 100%, rgba(80, 50, 20, 0.06), transparent 60%);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 0.25s ease, color 0.25s ease;
  }

  body {
    background-image: var(--vignette), var(--paper-grain);
    background-repeat: no-repeat, repeat;
    background-attachment: fixed, fixed;
    min-height: 100vh;
  }

  ::selection {
    background: var(--accent);
    color: var(--bg);
  }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 56px 28px 96px;
  }

  /* ============================================================
     HEADER
     ============================================================ */
  header {
    padding-bottom: 40px;
    margin-bottom: 40px;
    position: relative;
    border-bottom: 1px solid var(--rule);
  }

  .theme-toggle {
    position: absolute;
    top: 0;
    right: 0;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-dim);
    padding: 9px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    font-weight: 500;
  }

  .theme-toggle:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .frontispiece {
    text-align: center;
    margin-bottom: 28px;
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    letter-spacing: 0.6em;
    padding-left: 0.6em;
    opacity: 0.85;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    font-weight: 500;
    text-align: center;
  }

  h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 500;
    font-style: italic;
    font-size: clamp(42px, 6.4vw, 64px);
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 0 0 18px;
    color: var(--accent);
    text-align: center;
  }

  .subtitle {
    color: var(--ink-dim);
    font-size: 15.5px;
    max-width: 58ch;
    margin: 0 auto;
    line-height: 1.6;
    text-align: center;
  }

  .subtitle .rg-dot {
    color: var(--raven);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .progress-block {
    display: flex;
    align-items: baseline;
    gap: 28px;
    margin-top: 40px;
    flex-wrap: wrap;
    padding-top: 28px;
    border-top: 1px solid var(--rule-soft);
  }

  .progress-num {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 50px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
    font-feature-settings: "lnum" 1;
  }

  .progress-num em {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }

  .progress-num .sep {
    color: var(--ink-faint);
    margin: 0 4px;
  }

  .progress-bar {
    flex: 1;
    min-width: 200px;
    height: 2px;
    background: var(--rule-soft);
    position: relative;
    overflow: hidden;
  }

  .progress-bar > span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--accent-soft), var(--accent), var(--accent-hi));
    width: 0%;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-meta);
    font-weight: 500;
  }

  /* ============================================================
     FILTERS
     ============================================================ */
  .filters {
    display: flex;
    gap: 2px;
    margin: 40px 0 24px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--rule);
  }

  .filters button {
    background: none;
    border: none;
    color: var(--ink-meta);
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    transition: color 0.2s ease;
    margin-bottom: -1px;
    font-weight: 500;
  }

  .filters button:hover { color: var(--ink); }

  .filters button.active {
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
  }

  .filters button .count {
    color: var(--ink-faint);
    margin-left: 8px;
    font-weight: 400;
  }

  /* ============================================================
     SECTIONS + BOOKS
     ============================================================ */
  .section-head {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: 28px;
    color: var(--ink);
    margin: 52px 0 8px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    letter-spacing: -0.005em;
  }

  .section-head::before {
    content: "❦";
    color: var(--accent);
    font-style: normal;
    margin-right: 14px;
    font-size: 22px;
    display: inline-block;
    transform: translateY(-2px);
  }

  .section-head .title-text {
    flex: 1;
  }

  .section-head .tag {
    font-family: 'JetBrains Mono', monospace;
    font-style: normal;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-meta);
    font-weight: 500;
    white-space: nowrap;
  }

  .book {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 20px;
    padding: 22px 0;
    border-bottom: 1px solid var(--rule-soft);
    align-items: start;
    transition: opacity 0.2s ease;
  }

  .book:last-child { border-bottom: none; }

  .slot {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 22px;
    color: var(--accent);
    padding-top: 3px;
    text-align: right;
    font-variant-numeric: oldstyle-nums;
    font-weight: 600;
    letter-spacing: 0.02em;
    font-style: italic;
    line-height: 1;
  }

  .book-body { min-width: 0; }

  .book-title-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .book-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    line-height: 1.2;
    letter-spacing: -0.005em;
  }

  .book-author {
    color: var(--ink-dim);
    font-size: 14px;
    font-style: italic;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 500;
  }

  .book-author::before {
    content: "— ";
    color: var(--ink-faint);
  }

  .book-blurb {
    color: var(--ink-dim);
    font-size: 15px;
    line-height: 1.6;
    margin-top: 6px;
  }

  .book-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-meta);
    font-weight: 500;
    align-items: center;
  }

  .book-meta .rating {
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  .book-meta .rg {
    color: var(--raven);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
  }
  .book-meta .rg::before { content: "◆"; font-size: 7px; }

  .book-meta .must {
    color: var(--crimson);
    font-weight: 600;
  }
  .book-meta .must::before {
    content: "✦";
    margin-right: 5px;
    font-size: 9px;
  }

  /* checkbox */
  .check {
    grid-column: 3;
    grid-row: 1 / span 2;
    align-self: start;
    padding-top: 6px;
  }

  .check input {
    appearance: none;
    -webkit-appearance: none;
    width: 26px;
    height: 26px;
    border: 1.5px solid var(--ink-meta);
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .check input:hover { border-color: var(--accent); }

  .check input:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check input:checked::after {
    content: "";
    position: absolute;
    left: 8px;
    top: 3px;
    width: 6px;
    height: 13px;
    border: solid var(--check-tick);
    border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg);
  }

  .check input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  /* read state — struck through with rubrication line */
  .book.read .book-title {
    color: var(--read-tint);
    font-style: italic;
    text-decoration: line-through;
    text-decoration-color: var(--accent-soft);
    text-decoration-thickness: 1px;
  }
  .book.read .slot { color: var(--read-tint); }
  .book.read .book-author,
  .book.read .book-blurb { color: var(--read-tint); }
  .book.read .book-meta { color: var(--read-tint); }
  .book.read .book-meta .rating,
  .book.read .book-meta .rg,
  .book.read .book-meta .must { color: var(--read-tint); font-weight: 500; }
  .book.read .book-meta .must::before,
  .book.read .book-meta .rg::before { color: var(--read-tint); }

  /* ============================================================
     FOOTER
     ============================================================ */
  footer {
    margin-top: 72px;
    padding-top: 32px;
    border-top: 1px solid var(--rule);
    text-align: center;
  }

  .footer-ornament {
    color: var(--accent);
    font-size: 20px;
    letter-spacing: 0.8em;
    padding-left: 0.8em;
    margin-bottom: 24px;
    opacity: 0.75;
    font-family: 'Cormorant Garamond', serif;
  }

  .footer-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-meta);
    align-items: center;
  }

  footer button {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-dim);
    padding: 9px 16px;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease;
    font-weight: 500;
  }

  footer button:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .footer-tag {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    text-transform: none;
    letter-spacing: 0;
    font-size: 13px;
    color: var(--ink-faint);
    text-align: center;
    margin-top: 20px;
  }

  .hidden { display: none !important; }

  .empty {
    text-align: center;
    padding: 56px 0;
    color: var(--ink-meta);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
  }

  @media (max-width: 640px) {
    .wrap { padding: 36px 20px 72px; }
    .theme-toggle { position: static; display: block; margin: 0 auto 24px; }
    .frontispiece { margin-top: 12px; }
    .book { grid-template-columns: 38px 1fr auto; gap: 14px; padding: 18px 0; }
    .slot { font-size: 17px; padding-top: 4px; }
    .book-title { font-size: 18.5px; }
    .book-blurb { font-size: 14px; }
    .section-head { font-size: 22px; }
    .section-head::before { font-size: 18px; margin-right: 10px; }
    h1 { font-size: 42px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀ Parchment</button>
    <div class="frontispiece">❦ ❦ ❦</div>
    <div class="eyebrow">Warhammer 40,000 &nbsp;·&nbsp; Black Library</div>
    <h1>The Horus Heresy</h1>
    <p class="subtitle">A reading log in recommended order. Ratings out of ten. <span class="rg-dot">◆</span> marks Raven Guard content worth reading regardless of rating.</p>

    <div class="progress-block">
      <div class="progress-num"><em id="progress-count">0</em><span class="sep">/</span><span id="progress-total">0</span></div>
      <div class="progress-bar"><span id="progress-fill"></span></div>
      <div class="progress-label" id="progress-pct">0% complete</div>
    </div>
  </header>

  <nav class="filters" role="tablist">
    <button class="active" data-filter="all">All <span class="count" id="count-all"></span></button>
    <button data-filter="toread">To read <span class="count" id="count-toread"></span></button>
    <button data-filter="read">Read <span class="count" id="count-read"></span></button>
    <button data-filter="rg">Raven Guard <span class="count" id="count-rg"></span></button>
    <button data-filter="must">Must-read <span class="count" id="count-must"></span></button>
  </nav>

  <main id="list"></main>

  <div class="empty hidden" id="empty">The record is empty. Change your filter.</div>

  <footer>
    <div class="footer-ornament">❦ ❦ ❦</div>
    <div class="footer-row">
      <div>Local save · your browser only</div>
      <div style="display:flex; gap:10px;">
        <button id="export-btn">Export</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>
    <div class="footer-tag">The Emperor Protects</div>
  </footer>

</div>

<script>
// ============================================================
// Theme handling
// ============================================================
const THEME_KEY = 'hh-theme';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-toggle');
  btn.textContent = t === 'dark' ? '☀ Parchment' : '☾ Imperium';
  try { localStorage.setItem(THEME_KEY, t); } catch {}
}
(function initTheme(){
  let saved = null;
  try { saved = localStorage.getItem(THEME_KEY); } catch {}
  if (saved) return applyTheme(saved);
  const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  applyTheme(prefersLight ? 'light' : 'dark');
})();
document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
});

// ============================================================
// Horus Heresy reading data
// ============================================================
const BOOKS = [
  { slot: "I", title: "Horus Rising", author: "Dan Abnett", rating: 10, kind: "Novel", section: "The Opening Trilogy", must: true, blurb: "\"I was there, the day Horus slew the Emperor.\" The brotherhood before the fall." },
  { slot: "II", title: "False Gods", author: "Graham McNeill", rating: 8, kind: "Novel", section: "The Opening Trilogy", must: true, blurb: "The wound on Davin. The actual moment Horus tips." },
  { slot: "III", title: "Galaxy in Flames", author: "Ben Counter", rating: 7, kind: "Novel", section: "The Opening Trilogy", must: true, blurb: "Isstvaan III. Virus bombs. Tragic and pacey; the plot carries it." },

  { slot: "IV", title: "The Flight of the Eisenstein", author: "James Swallow", rating: 8, kind: "Novel", section: "The Dropsite Era", must: true, blurb: "Garro smuggling the warning to Terra. Reads like a thriller." },
  { slot: "V", title: "Fulgrim", author: "Graham McNeill", rating: 7, kind: "Novel", section: "The Dropsite Era", blurb: "Dropsite Massacre. Ferrus Manus's head hits the floor here. Slow middle, crucial events." },
  { slot: "VI", title: "Descent of Angels", author: "Mitchel Scanlon", rating: 4, kind: "Novel", section: "The Dropsite Era", blurb: "Dark Angel origin on Caliban. Feudal, slow, skippable." },
  { slot: "VII", title: "Legion", author: "Dan Abnett", rating: 9, kind: "Novel", section: "The Dropsite Era", must: true, blurb: "The Alpha Legion book that isn't about the Alpha Legion. End-reveal rewrites everything." },
  { slot: "VIII", title: "Battle for the Abyss", author: "Ben Counter", rating: 2, kind: "Novel", section: "The Dropsite Era", blurb: "Don't. Nothing in it matters." },
  { slot: "IX", title: "Mechanicum", author: "Graham McNeill", rating: 7, kind: "Novel", section: "The Dropsite Era", blurb: "Martian civil war. Skippable but solid." },
  { slot: "X", title: "Tales of Heresy", author: "Various", rating: 8, kind: "Anthology", section: "The Dropsite Era", blurb: "Read for Blood Games, The Last Church, After Desh'ea. Kharn meets Angron here." },

  { slot: "XI", title: "Fallen Angels", author: "Mike Lee", rating: 4, kind: "Novel", section: "The Second Wave", blurb: "Skip unless you're following the Dark Angels arc." },
  { slot: "XII", title: "A Thousand Sons", author: "Graham McNeill", rating: 9, kind: "Novel", section: "The Second Wave", must: true, blurb: "Magnus's tragedy. Pair immediately with Prospero Burns." },
  { slot: "XV", title: "Prospero Burns", author: "Dan Abnett", rating: 9, kind: "Novel", section: "The Second Wave", must: true, blurb: "Same event, Space Wolves POV. Anthropological, strange, brilliant." },
  { slot: "XIII", title: "Nemesis", author: "James Swallow", rating: 6, kind: "Novel", section: "The Second Wave", blurb: "Execution Force sent after Horus. Pulpy fun." },
  { slot: "XIV", title: "The First Heretic", author: "Aaron Dembski-Bowden", rating: 10, kind: "Novel", section: "The Second Wave", must: true, blurb: "Lorgar, Argel Tal, the real origin of the Heresy. Arguably the best in the series." },
  { slot: "XVI", title: "Age of Darkness", author: "Various", rating: 7, kind: "Anthology", section: "The Second Wave", rg: true, blurb: "Read for The Face of Treachery (first post-Isstvaan Raven Guard) and Abnett/ADB shorts." },

// ============================================================
// State + rendering
// ============================================================
const STORAGE_KEY = 'hh-reading-log-v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

let state = loadState();
let currentFilter = 'all';

const PRE_READ = [
  "Horus Rising","False Gods","Galaxy in Flames","The Flight of the Eisenstein",
  "Fulgrim","Legion","Mechanicum","Tales of Heresy","A Thousand Sons","Prospero Burns",
  "The First Heretic","Deliverance Lost","Know No Fear","Fear to Tread","Angel Exterminatus",
  "Betrayer","The Unremembered Empire","Pharos","Angels of Caliban","Praetorian of Dorn",
  "Corax","The Master of Mankind","Garro","Slaves to Darkness","The Burden of Loyalty"
];

if (Object.keys(state).length === 0) {
  PRE_READ.forEach(t => { state[t] = true; });
  saveState(state);
}

function keyOf(b) { return b.title; }

function bookMatchesFilter(b) {
  const isRead = !!state[keyOf(b)];
  switch (currentFilter) {
    case 'all': return true;
    case 'toread': return !isRead;
    case 'read': return isRead;
    case 'rg': return !!b.rg;
    case 'must': return !!b.must;
  }
  return true;
}

function renderList() {
  const root = document.getElementById('list');
  root.innerHTML = '';

  const visible = BOOKS.filter(bookMatchesFilter);

  if (visible.length === 0) {
    document.getElementById('empty').classList.remove('hidden');
    return;
  }
  document.getElementById('empty').classList.add('hidden');

  let currentSection = null;
  visible.forEach(b => {
    if (b.section !== currentSection) {
      currentSection = b.section;
      const h = document.createElement('h2');
      h.className = 'section-head';
      const sectionBooks = visible.filter(x => x.section === b.section);
      const sectionRead = sectionBooks.filter(x => state[keyOf(x)]).length;
      h.innerHTML = `<span class="title-text">${b.section}</span><span class="tag">${sectionRead} / ${sectionBooks.length}</span>`;
      root.appendChild(h);
    }

    const row = document.createElement('article');
    row.className = 'book' + (state[keyOf(b)] ? ' read' : '');
    row.innerHTML = `
      <div class="slot">${b.slot}</div>
      <div class="book-body">
        <div class="book-title-row">
          <span class="book-title">${b.title}</span>
          <span class="book-author">${b.author}</span>
        </div>
        <div class="book-blurb">${b.blurb}</div>
        <div class="book-meta">
          <span class="rating">${b.rating} / 10</span>
          <span class="kind">${b.kind}</span>
          ${b.must ? '<span class="must">Must-read</span>' : ''}
          ${b.rg ? '<span class="rg">Raven Guard</span>' : ''}
        </div>
      </div>
      <label class="check">
        <input type="checkbox" ${state[keyOf(b)] ? 'checked' : ''} data-title="${b.title.replace(/"/g,'&quot;')}" />
      </label>
    `;
    root.appendChild(row);
  });

  root.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', e => {
      const title = e.target.dataset.title;
      if (e.target.checked) state[title] = true;
      else delete state[title];
      saveState(state);
      renderAll();
    });
  });
}

function renderStats() {
  const total = BOOKS.length;
  const read = BOOKS.filter(b => state[keyOf(b)]).length;
  const pct = total ? Math.round((read / total) * 100) : 0;
  document.getElementById('progress-count').textContent = read;
  document.getElementById('progress-total').textContent = total;
  document.getElementById('progress-pct').textContent = pct + '% complete';
  document.getElementById('progress-fill').style.width = pct + '%';

  document.getElementById('count-all').textContent = total;
  document.getElementById('count-toread').textContent = BOOKS.filter(b => !state[keyOf(b)]).length;
  document.getElementById('count-read').textContent = read;
  document.getElementById('count-rg').textContent = BOOKS.filter(b => b.rg).length;
  document.getElementById('count-must').textContent = BOOKS.filter(b => b.must).length;
}

function renderAll() { renderStats(); renderList(); }

document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderList();
  });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Reset all reading progress? This cannot be undone.')) {
    state = {};
    saveState(state);
    renderAll();
  }
});

document.getElementById('export-btn').addEventListener('click', () => {
  const read = BOOKS.filter(b => state[keyOf(b)]).map(b => `[x] ${b.slot} · ${b.title} — ${b.author}`);
  const unread = BOOKS.filter(b => !state[keyOf(b)]).map(b => `[ ] ${b.slot} · ${b.title} — ${b.author}`);
  const text = `HORUS HERESY — READING LOG\n\nRead (${read.length}):\n${read.join('\n')}\n\nTo read (${unread.length}):\n${unread.join('\n')}`;
  navigator.clipboard?.writeText(text).then(() => alert('Copied to clipboard.'), () => {
    const w = window.open('', '_blank');
    w.document.write('<pre>' + text.replace(/</g,'&lt;') + '</pre>');
  });
});

renderAll();
</script>
